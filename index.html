<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – Sistema de Chamada</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Sora', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #06090f;
  overflow: hidden;
}

/* ===== FUNDO ANIMADO ===== */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: radial-gradient(ellipse at 20% 50%, rgba(37,99,235,.18) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(124,58,237,.12) 0%, transparent 50%),
              radial-gradient(ellipse at 60% 80%, rgba(16,163,74,.08) 0%, transparent 50%),
              #06090f;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  animation: drift 12s ease-in-out infinite;
}
.orb1 { width:400px; height:400px; background:rgba(37,99,235,.15); top:-100px; left:-100px; animation-delay:0s; }
.orb2 { width:300px; height:300px; background:rgba(124,58,237,.12); bottom:-80px; right:-80px; animation-delay:-4s; }
.orb3 { width:200px; height:200px; background:rgba(16,163,74,.1); top:50%; left:50%; animation-delay:-8s; }

@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(30px,-20px) scale(1.05); }
  66%      { transform: translate(-20px,30px) scale(.95); }
}

/* ===== GRADE ===== */
.grid-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ===== CARD ===== */
.card {
  position: relative;
  z-index: 1;
  width: 420px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 24px;
  padding: 48px 40px;
  backdrop-filter: blur(24px);
  box-shadow: 0 32px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.08);
  animation: slideUp .6s cubic-bezier(.16,1,.3,1) both;
}

@keyframes slideUp {
  from { opacity:0; transform:translateY(32px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== TOPO DO CARD ===== */
.card-header { text-align: center; margin-bottom: 36px; }

.logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 64px; height: 64px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  border-radius: 18px;
  font-size: 28px;
  margin-bottom: 20px;
  box-shadow: 0 8px 24px rgba(37,99,235,.4);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 8px 24px rgba(37,99,235,.4); }
  50%      { box-shadow: 0 8px 36px rgba(37,99,235,.7); }
}

.card-header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  color: #f0f4ff;
  letter-spacing: -.4px;
}

.card-header p {
  font-size: .85rem;
  color: rgba(255,255,255,.4);
  margin-top: 6px;
}

/* ===== INPUTS ===== */
.campo { margin-bottom: 16px; }

.campo label {
  display: block;
  font-size: .78rem;
  font-weight: 600;
  color: rgba(255,255,255,.5);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 8px;
}

.input-wrap {
  position: relative;
}

.input-wrap .icone {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
  opacity: .5;
}

.input-wrap input {
  width: 100%;
  padding: 13px 16px 13px 44px;
  background: rgba(255,255,255,.06);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 12px;
  color: #f0f4ff;
  font-family: 'Sora', sans-serif;
  font-size: .9rem;
  outline: none;
  transition: border .2s, background .2s, box-shadow .2s;
}

.input-wrap input::placeholder { color: rgba(255,255,255,.25); }

.input-wrap input:focus {
  border-color: #2563eb;
  background: rgba(37,99,235,.08);
  box-shadow: 0 0 0 4px rgba(37,99,235,.15);
}

.input-wrap input.erro-input {
  border-color: #dc2626;
  box-shadow: 0 0 0 4px rgba(220,38,38,.15);
  animation: shake .4s cubic-bezier(.36,.07,.19,.97);
}

@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%      { transform:translateX(-8px); }
  40%      { transform:translateX(8px); }
  60%      { transform:translateX(-5px); }
  80%      { transform:translateX(5px); }
}

/* OLHO SENHA */
.toggle-senha {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: rgba(255,255,255,.35);
  cursor: pointer;
  font-size: 18px;
  padding: 2px;
  transition: color .2s;
}
.toggle-senha:hover { color: rgba(255,255,255,.7); }

/* ===== OPÇÕES ===== */
.opcoes {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}

.lembrar {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: .82rem;
  color: rgba(255,255,255,.45);
  user-select: none;
}

.lembrar input[type=checkbox] {
  appearance: none;
  width: 16px; height: 16px;
  border: 1.5px solid rgba(255,255,255,.2);
  border-radius: 4px;
  cursor: pointer;
  transition: .2s;
  position: relative;
}
.lembrar input[type=checkbox]:checked {
  background: #2563eb;
  border-color: #2563eb;
}
.lembrar input[type=checkbox]:checked::after {
  content: "✓";
  position: absolute;
  top: -1px; left: 2px;
  font-size: 11px;
  color: white;
  font-weight: 700;
}

.esqueci {
  font-size: .82rem;
  color: rgba(255,255,255,.35);
  text-decoration: none;
  transition: color .2s;
}
.esqueci:hover { color: #2563eb; }

/* ===== BOTÃO LOGIN ===== */
.btn-login {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  border: none;
  border-radius: 12px;
  font-family: 'Sora', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  letter-spacing: .3px;
  cursor: pointer;
  transition: transform .15s, box-shadow .2s, opacity .2s;
  box-shadow: 0 4px 20px rgba(37,99,235,.4);
  position: relative;
  overflow: hidden;
}

.btn-login::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
  opacity: 0;
  transition: opacity .2s;
}

.btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(37,99,235,.5); }
.btn-login:hover::before { opacity: 1; }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

/* SPINNER */
.spinner {
  display: none;
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== ERRO ===== */
.msg-erro {
  margin-top: 16px;
  padding: 12px 16px;
  background: rgba(220,38,38,.12);
  border: 1px solid rgba(220,38,38,.3);
  border-radius: 10px;
  color: #fca5a5;
  font-size: .84rem;
  text-align: center;
  display: none;
  animation: fadeIn .3s ease;
}
.msg-erro.show { display: block; }

@keyframes fadeIn {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ===== RODAPÉ ===== */
.card-footer {
  text-align: center;
  margin-top: 28px;
  font-size: .78rem;
  color: rgba(255,255,255,.2);
  font-family: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div class="grid-bg"></div>

<div class="card">

  <div class="card-header">
    <div class="logo">📚</div>
    <h1>Sistema de Chamada</h1>
    <p>Faça login para acessar as turmas</p>
  </div>

  <div class="campo">
    <label>Usuário</label>
    <div class="input-wrap">
      <span class="icone">👤</span>
      <input type="text" id="usuario" placeholder="Digite seu usuário" autocomplete="username">
    </div>
  </div>

  <div class="campo">
    <label>Senha</label>
    <div class="input-wrap">
      <span class="icone">🔒</span>
      <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
      <button class="toggle-senha" onclick="toggleSenha()" type="button" title="Mostrar/ocultar senha">👁</button>
    </div>
  </div>

  <div class="opcoes">
    <label class="lembrar">
      <input type="checkbox" id="lembrar"> Lembrar acesso
    </label>
    <a href="#" class="esqueci">Esqueci a senha</a>
  </div>

  <button class="btn-login" id="btnLogin" onclick="entrar()">
    <span id="btn-texto">ENTRAR</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="msg-erro" id="erro"></div>

  <div class="card-footer">CHAMADA ESCOLAR · 2026 · EEEP WALTER RAMOS DE ARAÚJO</div>

</div>

<script>
// ===== CREDENCIAIS =====
const USUARIO_CORRETO = "admin";
const SENHA_CORRETA   = "1234";

// ===== VERIFICAR SESSÃO SALVA =====
window.addEventListener("DOMContentLoaded", () => {
  const salvo = localStorage.getItem("chamada_sessao");
  if (salvo === "logado") {
    window.location.href = "sistema.html";
    return;
  }
  const usuarioSalvo = localStorage.getItem("chamada_usuario");
  if (usuarioSalvo) {
    document.getElementById("usuario").value = usuarioSalvo;
    document.getElementById("lembrar").checked = true;
  }

  // Enter para logar
  document.getElementById("senha").addEventListener("keydown", e => {
    if (e.key === "Enter") entrar();
  });
  document.getElementById("usuario").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("senha").focus();
  });
});

// ===== LOGIN =====
function entrar() {
  const usuario = document.getElementById("usuario").value.trim();
  const senha   = document.getElementById("senha").value;
  const lembrar = document.getElementById("lembrar").checked;
  const btn     = document.getElementById("btnLogin");

  // Limpa erros
  mostrarErro("");
  document.getElementById("usuario").classList.remove("erro-input");
  document.getElementById("senha").classList.remove("erro-input");

  if (!usuario || !senha) {
    mostrarErro("⚠️ Preencha todos os campos.");
    if (!usuario) document.getElementById("usuario").classList.add("erro-input");
    if (!senha)   document.getElementById("senha").classList.add("erro-input");
    return;
  }

  // Simula carregamento
  btn.disabled = true;
  document.getElementById("btn-texto").style.display = "none";
  document.getElementById("spinner").style.display   = "block";

  setTimeout(() => {
    if (usuario === USUARIO_CORRETO && senha === SENHA_CORRETA) {
      if (lembrar) {
        localStorage.setItem("chamada_sessao", "logado");
        localStorage.setItem("chamada_usuario", usuario);
      } else {
        sessionStorage.setItem("chamada_sessao", "logado");
        localStorage.removeItem("chamada_sessao");
        localStorage.removeItem("chamada_usuario");
      }
      window.location.href = "chamada.html";
    } else {
      btn.disabled = false;
      document.getElementById("btn-texto").style.display = "block";
      document.getElementById("spinner").style.display   = "none";
      mostrarErro("❌ Usuário ou senha incorretos.");
      document.getElementById("usuario").classList.add("erro-input");
      document.getElementById("senha").classList.add("erro-input");
      document.getElementById("senha").value = "";
      document.getElementById("senha").focus();
    }
  }, 900);
}

function mostrarErro(msg) {
  const el = document.getElementById("erro");
  el.innerText = msg;
  el.classList.toggle("show", !!msg);
}

function toggleSenha() {
  const input = document.getElementById("senha");
  input.type = input.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
